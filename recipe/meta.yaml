{% set version = "2.5.2" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rcompanion
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/rcompanion_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/rcompanion/rcompanion_{{ version }}.tar.gz
  sha256: 25c9ab6b9f845f190437cdda0f5fa6d2ce664ddadd53b328728716f9fbb875cb

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-desctools
    - r-boot
    - r-coin
    - r-lmtest
    - r-multcompview
    - r-nortest
    - r-plyr
  run:
    - r-base
    - r-desctools
    - r-boot
    - r-coin
    - r-lmtest
    - r-multcompview
    - r-nortest
    - r-plyr

test:
  commands:
    - $R -e "library('rcompanion')"           # [not win]
    - "\"%R%\" -e \"library('rcompanion')\""  # [win]

about:
  home: http://rcompanion.org/
  license: GPL-3.0-only
  summary: Functions and datasets to support "Summary and Analysis of Extension Program Evaluation in R" and "An R Companion for the Handbook of Biological Statistics". Vignettes are available at <http://rcompanion.org>.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r

